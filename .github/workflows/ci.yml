# Minimal healthy CI: lint once, test across a small Python matrix, using uv.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv run --extra dev ruff check .
      - run: uv run --extra dev ruff format --check .
      - run: uv run --extra dev mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      # One command so the interpreter and the dev extra always match: a bare
      # `uv run` after a separate `uv sync --extra dev --python X` would re-sync
      # to the default environment (no dev extra, default interpreter) and drop
      # pytest.
      - run: uv run --extra dev --python ${{ matrix.python-version }} pytest --cov --cov-report=term-missing
